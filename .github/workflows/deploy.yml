name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: wiki-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: |
            - args: ['--frozen-lockfile']
      - name: Build Wiki
        run: pnpm build
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.vitepress/dist'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
        id: deploy
